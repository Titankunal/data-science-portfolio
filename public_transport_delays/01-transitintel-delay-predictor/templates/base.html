<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transit Delay Dashboard</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚆</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --dark-navy: #0d1b2a;
            --navy: #1b263b;
            --light-navy: #415a77;
            --teal: #5bc0be;
            --orange: #ff8c00;
            --orange-glow: rgba(255, 140, 0, 0.4);
            --text-color: #e0e1dd;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(-45deg, #0d1b2a, #1b263b, #0d1b2a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin-bottom: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-navy);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--navy);
            border: 1px solid var(--orange);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--orange);
        }

        .navbar {
            background: rgba(13, 27, 42, 0.7) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: none;
            position: relative;
        }

        .navbar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--orange), transparent);
            animation: flowLine 3s linear infinite;
        }

        @keyframes flowLine {
            0% {
                background-position: -100% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .navbar-brand,
        .nav-link {
            color: var(--text-color) !important;
            transition: all 0.3s ease;
        }

        .nav-link {
            position: relative;
            padding-bottom: 5px;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 50%;
            background-color: var(--orange);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-link:hover::after,
        .nav-item.active .nav-link::after {
            width: 80%;
        }

        .nav-link:hover {
            color: var(--orange) !important;
        }

        .card {
            background-color: var(--navy);
            border: 1px solid rgba(255, 140, 0, 0.2);
            color: var(--text-color);
            margin-bottom: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 140, 0, 0.8);
            box-shadow: 0 10px 20px var(--orange-glow);
        }

        .card-header {
            border-bottom: 1px solid rgba(255, 140, 0, 0.2);
            background-color: rgba(0, 0, 0, 0.2);
            font-weight: 600;
        }

        .btn {
            transition: all 0.3s ease;
            border-radius: 8px;
            font-weight: 600;
        }

        .btn-primary {
            background-color: var(--orange);
            border-color: var(--orange);
            color: white;
        }

        .btn-primary:hover {
            background-color: #e67e22;
            border-color: #e67e22;
            box-shadow: 0 0 15px var(--orange-glow);
            transform: translateY(-2px);
        }

        .btn-outline-light:hover {
            box-shadow: 0 0 15px var(--orange-glow);
            transform: translateY(-2px);
            background-color: rgba(255, 140, 0, 0.1);
            color: var(--orange) !important;
        }

        .text-orange {
            color: var(--orange) !important;
        }

        .text-gradient {
            background: linear-gradient(90deg, #ff8c00, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-control,
        .form-select {
            background-color: var(--light-navy);
            border: 1px solid rgba(255, 140, 0, 0.2);
            color: white;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: var(--light-navy);
            color: white;
            border-color: var(--orange);
            box-shadow: 0 0 10px var(--orange-glow);
        }

        .form-select option {
            background-color: var(--navy);
            color: white;
        }

        input[type="range"] {
            accent-color: var(--orange);
            transition: all 0.3s ease;
        }

        .form-check-input:checked {
            background-color: var(--orange);
            border-color: var(--orange);
            box-shadow: 0 0 10px var(--orange-glow);
        }

        .content-wrapper {
            flex: 1 0 auto;
        }

        .footer {
            flex-shrink: 0;
            background: rgba(13, 27, 42, 0.9);
            border-top: 1px solid rgba(255, 140, 0, 0.2);
            padding: 20px 0;
            margin-top: 50px;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Pulse animations for prediction */
        .pulse-red {
            animation: pulseRed 2s infinite;
        }

        .pulse-green {
            animation: pulseGreen 2s infinite;
        }

        @keyframes pulseRed {
            0% {
                box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(220, 53, 69, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
            }
        }

        @keyframes pulseGreen {
            0% {
                box-shadow: 0 0 0 0 rgba(25, 135, 84, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(25, 135, 84, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(25, 135, 84, 0);
            }
        }

        .fade-scale {
            animation: fadeScale 0.5s ease-out forwards;
        }

        @keyframes fadeScale {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg py-3 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
                🚆 <span class="ms-2"><span class="text-orange">Transit</span>Intel</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="/predict">Live Prediction</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="/analytics">Analytics</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" href="/insights">Model Insights</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="content-wrapper">
        <div class="container mt-4 fade-in">
            {% block content %}{% endblock %}
        </div>
    </div>

    <footer class="footer mt-auto">
        <div class="container text-center">
            <div class="mb-3">
                <span class="fw-bold fs-5">TransitIntel Predictor</span>
            </div>
            <div class="mb-3">
                <span class="badge bg-dark border border-secondary p-2 me-1">Flask</span>
                <span class="badge bg-dark border border-secondary p-2 me-1">XGBoost</span>
                <span class="badge bg-dark border border-secondary p-2 me-1">Pandas</span>
                <span class="badge bg-dark border border-secondary p-2 me-1">Plotly</span>
                <span class="badge bg-dark border border-secondary p-2">Bootstrap 5</span>
            </div>
            <div class="small text-muted mt-3">
                &copy; 2026 TransitIntel | <a href="https://github.com/Titankunal/All-Projects" target="_blank"
                    class="text-orange text-decoration-none fw-bold">GitHub Repository</a>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
